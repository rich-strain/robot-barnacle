<!DOCTYPE html>
<html lang="en">

    <meta name="description" content="Richard Strain – Full-Stack Web Developer specializing in MERN stack, React, Next.js, and payment integrations. Available for remote positions." />

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <!--
      Apply theme class before React renders to prevent a flash of the wrong theme.
      Defaults to 'dark' if no preference is stored.
    -->
    <script>
      (function () {
        var theme = localStorage.getItem('theme') || 'dark';
        if (theme === 'dark') document.documentElement.classList.add('dark');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
